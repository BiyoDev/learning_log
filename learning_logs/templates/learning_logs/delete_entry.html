{% extends "learning_logs/base.html" %}

{% block content %}

  <p>Are you sure you want to delete this entry?</p>
  <p><i>"{{ entry.text|truncatechars:50 }}..."</i></p>

  <form action="{% url 'learning_logs:delete_entry' entry.id %}" method='post'>
    {% csrf_token %}
    <button name='submit' class="btn btn-danger">Delete</button>
    <a href="{% url 'learning_logs:topic' entry.topic.id %}" class="btn btn-secondary">Cancel</a>
  </form>

{% endblock content %}
